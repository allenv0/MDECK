name: MDeck
options:
  bundleIdPrefix: com.moerdowo
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
schemes:
  MDeck:
    build:
      targets:
        MDeck: all
        MDeckTests: test
    test:
      targets:
        - MDeckTests
targets:
  MDeck:
    type: application
    platform: macOS
    sources:
      - Sources
      - path: Resources/mdeck.icns
    info:
      path: Resources/Info.plist
      properties:
        CFBundleName: MDeck
        CFBundleDisplayName: MDeck
        CFBundleIconFile: mdeck
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: ""
        NSMainNibFile: ""
        NSPrincipalClass: NSApplication
        LSApplicationCategoryType: public.app-category.music
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    entitlements:
      path: Resources/MDeck.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-only: true
        com.apple.security.files.bookmarks.app-scope: true
        com.apple.security.assets.music.read-only: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.moerdowo.MDeck
        GENERATE_INFOPLIST_FILE: NO
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_PREVIEWS: YES
        CODE_SIGN_ENTITLEMENTS: Resources/MDeck.entitlements
  MDeckTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
    dependencies:
      - target: MDeck
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.moerdowo.MDeckTests
        GENERATE_INFOPLIST_FILE: YES
